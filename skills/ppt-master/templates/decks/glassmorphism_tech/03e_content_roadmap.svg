    <rect x="788" y="151" width="414" height="1" fill="url(#glassEdge)"/>
    <text x="995" y="186" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" fill="#3DDDFC" text-anchor="middle" letter-spacing="3">{{GATE_EYEBROW}}</text>
    <text x="995" y="220" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="22" font-weight="900" fill="#E8ECFF" text-anchor="middle">{{GATE_TITLE}}</text>
    <line x1="800" y1="245" x2="1190" y2="245" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <g id="gate-1">
      <circle cx="816" cy="282" r="14" fill="#5B8DEF" fill-opacity="0.3"/>
      <text x="816" y="287" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" fill="#5B8DEF" text-anchor="middle">01</text>
      <text x="844" y="276" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{GATE_1_TITLE}}</text>
      <text x="844" y="298" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500" fill="#A8B0D0">{{GATE_1_CRITERIA}}</text>
    </g>
    <g id="gate-2">
      <circle cx="816" cy="354" r="14" fill="#A26BFA" fill-opacity="0.3"/>
      <text x="816" y="359" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" fill="#A26BFA" text-anchor="middle">02</text>
      <text x="844" y="348" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{GATE_2_TITLE}}</text>
      <text x="844" y="370" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500" fill="#A8B0D0">{{GATE_2_CRITERIA}}</text>
    </g>
    <g id="gate-3">
      <circle cx="816" cy="426" r="14" fill="#3DDDFC" fill-opacity="0.3"/>
      <text x="816" y="431" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" fill="#3DDDFC" text-anchor="middle">03</text>
      <text x="844" y="420" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{GATE_3_TITLE}}</text>
      <text x="844" y="442" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500" fill="#A8B0D0">{{GATE_3_CRITERIA}}</text>
    </g>
    <g id="gate-4">
      <circle cx="816" cy="498" r="14" fill="#4ADE80" fill-opacity="0.3"/>
      <text x="816" y="503" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="900" fill="#4ADE80" text-anchor="middle">04</text>
      <text x="844" y="492" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{GATE_4_TITLE}}</text>
      <text x="844" y="514" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500" fill="#A8B0D0">{{GATE_4_CRITERIA}}</text>
    </g>
    <line x1="800" y1="545" x2="1190" y2="545" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="816" y="580" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700" fill="#A8B0D0">{{GATE_NOTE_1}}</text>
    <text x="816" y="604" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700" fill="#A8B0D0">{{GATE_NOTE_2}}</text>
    <text x="816" y="628" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="500" fill="#6B7299">{{GATE_NOTE_3}}</text>
  </g>

  <g id="footer">
    <text x="60" y="700" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#6B7299">{{SECTION_NAME}}</text>
    <text x="1220" y="700" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#6B7299" text-anchor="end">{{PAGE_NUM}}</text>
  </g>
</svg>
