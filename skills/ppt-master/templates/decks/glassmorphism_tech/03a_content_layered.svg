    <linearGradient id="badgeGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="0%">
