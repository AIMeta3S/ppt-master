    <text x="724" y="194" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="19" font-weight="900" fill="#FFFFFF">{{QUAD_2_TITLE}}</text>
    <rect x="1070" y="172" width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.22"/>
