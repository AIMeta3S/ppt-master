  <g id="footer">
    <text x="60" y="696" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#6B7299">{{SECTION_NAME}}</text>
    <text x="1220" y="696" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#6B7299" text-anchor="end">{{PAGE_NUM}}</text>
