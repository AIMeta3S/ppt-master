      <text x="122" y="507" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_3_ITEM_1}}</text>
      <text x="122" y="528" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_3_ITEM_1_DESC}}</text>
