      <text x="702" y="253" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_2_ITEM_1}}</text>
      <text x="702" y="274" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_2_ITEM_1_DESC}}</text>
      <circle cx="686" cy="304" r="6" fill="#A26BFA"/>
      <text x="702" y="309" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_2_ITEM_2}}</text>
      <text x="702" y="330" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_2_ITEM_2_DESC}}</text>
