    <use data-icon="phosphor-duotone/sparkle" x="680" y="426" width="32" height="32" fill="#3DDDFC"/>
    <text x="724" y="448" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="19" font-weight="900" fill="#FFFFFF">{{QUAD_4_TITLE}}</text>
    <rect x="1070" y="426" width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.22"/>
    <text x="1130" y="445" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">{{QUAD_4_TAG}}</text>
    <g id="q4-items">
      <circle cx="686" cy="502" r="6" fill="#3DDDFC"/>
      <text x="702" y="507" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_4_ITEM_1}}</text>
      <text x="702" y="528" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_4_ITEM_1_DESC}}</text>
      <circle cx="686" cy="558" r="6" fill="#3DDDFC"/>
      <text x="702" y="563" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_4_ITEM_2}}</text>
      <text x="702" y="584" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_4_ITEM_2_DESC}}</text>
      <circle cx="686" cy="614" r="6" fill="#3DDDFC"/>
      <text x="702" y="619" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_4_ITEM_3}}</text>
    </g>
