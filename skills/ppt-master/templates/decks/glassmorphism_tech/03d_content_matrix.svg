      <text x="122" y="584" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_3_ITEM_2_DESC}}</text>
      <circle cx="106" cy="614" r="6" fill="#F59E0B"/>
      <text x="122" y="619" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_3_ITEM_3}}</text>
