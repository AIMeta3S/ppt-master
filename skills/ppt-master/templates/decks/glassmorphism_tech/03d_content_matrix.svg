<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="50%" stop-color="#A26BFA"/>
      <stop offset="100%" stop-color="#3DDDFC"/>
    </linearGradient>
    <radialGradient id="bgGlowA" cx="30%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowB" cx="70%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#A26BFA" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A26BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2150" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#1A2150" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="headBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="headPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A26BFA" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#A26BFA" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="headAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="headCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DDDFC" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3DDDFC" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="glassEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 2×2 quadrant matrix with axis frame. -->
  <g id="bg">
    <rect width="1280" height="720" fill="#0A0E27"/>
    <rect width="1280" height="720" fill="url(#bgGlowA)"/>
    <rect width="1280" height="720" fill="url(#bgGlowB)"/>
  </g>

  <g id="header">
    <rect x="60" y="50" width="6" height="32" rx="3" fill="url(#titleGradient)"/>
    <text x="80" y="76" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="34" font-weight="900" fill="#E8ECFF">{{PAGE_TITLE}}</text>
    <text x="80" y="108" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="600" fill="#A8B0D0" letter-spacing="3">{{EYEBROW}}</text>
  </g>

  <g id="axis-frame">
    <rect x="80" y="125" width="540" height="22" rx="11" fill="#5B8DEF" fill-opacity="0.18"/>
    <text x="350" y="141" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#5B8DEF" text-anchor="middle" letter-spacing="3">{{AXIS_X_LEFT}}</text>
    <rect x="660" y="125" width="540" height="22" rx="11" fill="#A26BFA" fill-opacity="0.2"/>
    <text x="930" y="141" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#A26BFA" text-anchor="middle" letter-spacing="3">{{AXIS_X_RIGHT}}</text>
    <rect x="38" y="158" width="22" height="220" rx="11" fill="#FFFFFF" fill-opacity="0.06"/>
    <text x="49" y="268" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#A8B0D0" text-anchor="middle" letter-spacing="2" transform="rotate(-90, 49, 268)">{{AXIS_Y_TOP}}</text>
    <rect x="38" y="402" width="22" height="220" rx="11" fill="#FFFFFF" fill-opacity="0.06"/>
    <text x="49" y="512" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#A8B0D0" text-anchor="middle" letter-spacing="2" transform="rotate(-90, 49, 512)">{{AXIS_Y_BOTTOM}}</text>
  </g>

  <g id="quad-1">
    <rect x="80" y="158" width="540" height="232" rx="16" fill="url(#cardGlass)" stroke="#5B8DEF" stroke-opacity="0.35" stroke-width="1"/>
    <rect x="98" y="159" width="504" height="1" fill="url(#glassEdge)"/>
    <path d="M 94 158 h 512 a 14 14 0 0 1 14 14 v 46 h -540 v -46 a 14 14 0 0 1 14 -14 Z" fill="url(#headBlue)"/>
    <circle cx="116" cy="188" r="18" fill="#0A0E27" fill-opacity="0.5"/>
    <use data-icon="phosphor-duotone/bug" x="100" y="172" width="32" height="32" fill="#5B8DEF"/>
    <text x="144" y="194" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="19" font-weight="900" fill="#FFFFFF">{{QUAD_1_TITLE}}</text>
    <rect x="490" y="172" width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.22"/>
    <text x="550" y="191" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">{{QUAD_1_TAG}}</text>
    <g id="q1-items">
      <circle cx="106" cy="248" r="6" fill="#5B8DEF"/>
      <text x="122" y="253" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_1_ITEM_1}}</text>
      <text x="122" y="274" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_1_ITEM_1_DESC}}</text>
      <circle cx="106" cy="304" r="6" fill="#5B8DEF"/>
      <text x="122" y="309" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_1_ITEM_2}}</text>
      <text x="122" y="330" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{QUAD_1_ITEM_2_DESC}}</text>
      <circle cx="106" cy="360" r="6" fill="#5B8DEF"/>
      <text x="122" y="365" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="700" fill="#E8ECFF">{{QUAD_1_ITEM_3}}</text>
