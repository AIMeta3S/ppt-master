<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="50%" stop-color="#A26BFA"/>
      <stop offset="100%" stop-color="#3DDDFC"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#0A0E27" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0A0E27" stop-opacity="0.72"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="68%">
      <stop offset="0%" stop-color="#0A0E27" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E27" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="bgGlowA" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5B8DEF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowB" cx="70%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#A26BFA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#A26BFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pillFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#A26BFA" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Breathing page: full-canvas atmosphere, large centered statement.
       For a project AI background, add <image> inside <g id="bg"> before glows. -->
  <g id="bg">
    <rect width="1280" height="720" fill="#0A0E27"/>
    <rect width="1280" height="720" fill="url(#bgGlowA)"/>
    <rect width="1280" height="720" fill="url(#bgGlowB)"/>
    <rect width="1280" height="720" fill="url(#scrim)"/>
    <rect width="1280" height="720" fill="url(#vignette)"/>
  </g>

  <g id="chapter-num">
    <text x="640" y="180" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" fill="#3DDDFC" letter-spacing="5" text-anchor="middle">{{CHAPTER_NUM}}</text>
    <line x1="640" y1="205" x2="608" y2="205" stroke="#3DDDFC" stroke-width="2" stroke-linecap="round"/>
    <line x1="640" y1="205" x2="672" y2="205" stroke="#3DDDFC" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="chapter-title">
    <text x="640" y="330" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="68" font-weight="900" fill="#E8ECFF" text-anchor="middle"><tspan fill="url(#titleGradient)">{{CHAPTER_TITLE}}</tspan></text>
  </g>

  <g id="chapter-desc">
    <text x="640" y="408" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="24" font-weight="400" fill="#A8B0D0" text-anchor="middle">{{CHAPTER_DESC}}</text>
  </g>

  <g id="theme-pills">
    <g id="pill-1">
      <rect x="270" y="510" width="170" height="62" rx="31" fill="url(#pillFill)" stroke="#5B8DEF" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="312" cy="541" r="6" fill="#5B8DEF"/>
      <text x="332" y="547" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700" fill="#E8ECFF">{{PILL_1}}</text>
    </g>
    <g id="pill-2">
      <rect x="460" y="510" width="170" height="62" rx="31" fill="url(#pillFill)" stroke="#A26BFA" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="502" cy="541" r="6" fill="#A26BFA"/>
      <text x="522" y="547" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700" fill="#E8ECFF">{{PILL_2}}</text>
    </g>
    <g id="pill-3">
      <rect x="650" y="510" width="170" height="62" rx="31" fill="url(#pillFill)" stroke="#3DDDFC" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="692" cy="541" r="6" fill="#3DDDFC"/>
      <text x="712" y="547" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700" fill="#E8ECFF">{{PILL_3}}</text>
    </g>
    <g id="pill-4">
      <rect x="840" y="510" width="170" height="62" rx="31" fill="url(#pillFill)" stroke="#4ADE80" stroke-opacity="0.55" stroke-width="1"/>
      <circle cx="882" cy="541" r="6" fill="#4ADE80"/>
      <text x="902" y="547" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="20" font-weight="700" fill="#E8ECFF">{{PILL_4}}</text>
    </g>
  </g>

  <g id="footer">
    <text x="60" y="688" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#A8B0D0">{{SECTION_NAME}}</text>
    <text x="1220" y="688" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="600" fill="#6B7299" text-anchor="end">{{PAGE_NUM}}</text>
  </g>
</svg>
