    <use data-icon="phosphor-duotone/users-three" x="896" y="208" width="40" height="40" fill="#E8ECFF"/>
    <text x="1046" y="226" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="700" fill="#E8ECFF" letter-spacing="3" text-anchor="middle">{{COL_3_TAG}}</text>
    <text x="1046" y="266" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">{{COL_3_TITLE}}</text>
    <text x="1046" y="328" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="600" fill="#3DDDFC" letter-spacing="2" text-anchor="middle">{{COL_3_KICKER}}</text>
    <line x1="900" y1="356" x2="1192" y2="356" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <g id="col3-feat">
      <circle cx="896" cy="395" r="4" fill="#3DDDFC"/>
      <text x="912" y="400" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_3_FEAT_1}}</text>
      <text x="912" y="422" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_3_FEAT_1_DESC}}</text>
      <circle cx="896" cy="465" r="4" fill="#3DDDFC"/>
      <text x="912" y="470" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_3_FEAT_2}}</text>
      <text x="912" y="492" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_3_FEAT_2_DESC}}</text>
      <circle cx="896" cy="535" r="4" fill="#3DDDFC"/>
      <text x="912" y="540" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_3_FEAT_3}}</text>
      <text x="912" y="562" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_3_FEAT_3_DESC}}</text>
