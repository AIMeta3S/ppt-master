    <text x="266" y="266" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle">{{COL_1_TITLE}}</text>
    <text x="266" y="328" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="15" font-weight="600" fill="#3DDDFC" letter-spacing="2" text-anchor="middle">{{COL_1_KICKER}}</text>
    <line x1="120" y1="356" x2="412" y2="356" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <g id="col1-feat">
      <circle cx="116" cy="395" r="4" fill="#5B8DEF"/>
      <text x="132" y="400" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_1_FEAT_1}}</text>
      <text x="132" y="422" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_1_FEAT_1_DESC}}</text>
      <circle cx="116" cy="465" r="4" fill="#5B8DEF"/>
      <text x="132" y="470" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_1_FEAT_2}}</text>
      <text x="132" y="492" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_1_FEAT_2_DESC}}</text>
      <circle cx="116" cy="535" r="4" fill="#5B8DEF"/>
      <text x="132" y="540" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_1_FEAT_3}}</text>
      <text x="132" y="562" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_1_FEAT_3_DESC}}</text>
    </g>
    <rect x="120" y="600" width="292" height="46" rx="10" fill="#5B8DEF" fill-opacity="0.15" stroke="#5B8DEF" stroke-opacity="0.5" stroke-width="1"/>
    <text x="266" y="630" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="14" font-weight="700" fill="#3DDDFC" text-anchor="middle">{{COL_1_FITS}}</text>
