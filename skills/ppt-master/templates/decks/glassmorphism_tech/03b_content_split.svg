      <text x="522" y="432" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_2_FEAT_1_DESC}}</text>
      <circle cx="506" cy="475" r="4" fill="#A26BFA"/>
