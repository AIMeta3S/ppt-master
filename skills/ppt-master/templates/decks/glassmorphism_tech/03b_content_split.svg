      <circle cx="506" cy="545" r="4" fill="#A26BFA"/>
      <text x="522" y="550" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="16" font-weight="700" fill="#E8ECFF">{{COL_2_FEAT_3}}</text>
      <text x="522" y="572" font-family="&quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, sans-serif" font-size="13" font-weight="400" fill="#A8B0D0">{{COL_2_FEAT_3_DESC}}</text>
